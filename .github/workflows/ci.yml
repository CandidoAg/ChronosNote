name: ChronosNote CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # 🖥️ BACKEND JOB: Multi-stage Verification using a Matrix Strategy
  backend-validation:
    name: Backend (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [ "Dotnet Checks", "SQLite Concurrency", "Hangfire Pipeline" ]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet Dependencies
      run: dotnet restore ChronosNote.sln

    - name: Publish Backend (Release Mode)
      run: |
        dotnet publish ChronosNote.sln \
          --configuration Release \
          --output ./publish \
          --no-restore

    - name: Run Unit Tests & Coverage
      if: matrix.suite == 'Dotnet Checks'
      run: |
        dotnet test ChronosNote.sln \
          --configuration Release \
          --no-build \
          --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura,opencover \
             DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/Program.cs,**/*Migrations/*.cs"

    - name: Generate Code Coverage Report Summary
      if: matrix.suite == 'Dotnet Checks'
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: 'TestResults/**/*cobertura.xml'
        badge: true
        fail_below_min: true 
        format: markdown
        output: both
        thresholds: '85 80' 

    - name: Publish Coverage Summary to GitHub Action Summary
      if: matrix.suite == 'Dotnet Checks'
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

    - name: Run SQLite Concurrency Profiling Tests
      if: matrix.suite == 'SQLite Concurrency'
      run: |
        echo "Ejecutando pruebas de estrés de concurrencia sobre SQLite..."
        dotnet test ChronosNote.sln --configuration Release --no-build --filter "Category=Stress" --verbosity normal

    - name: Run Hangfire Pipeline Mocking Tests
      if: matrix.suite == 'Hangfire Pipeline'
      run: |
        echo "Ejecutando validación determinista de colas de Hangfire..."
        dotnet test ChronosNote.sln --configuration Release --no-build --filter "Category=Integration" --verbosity normal
    
    - name: Upload Backend Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: chronosnote-backend-build
        path: ./publish/

  # 🎨 FRONTEND JOB: Node + pnpm Assets Build with Matrix
  frontend-validation:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Get pnpm Store Directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache pnpm Dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('src/client/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install Dependencies
      run: pnpm --filter client install

    - name: Run Linter / Code Formatting
      run: pnpm --filter client lint || echo "Linter warnings found"
      continue-on-error: true

    - name: Compile & Production Asset Creation
      run: pnpm --filter client build
          
    - name: Run Frontend Tests
      run: pnpm --filter client test:coverage
    
    - name: Upload Production Assets Bundle
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: chronosnote-frontend-assets
        path: src/client/dist/
        retention-days: 7
      
    - name: Generate Frontend Coverage Report Summary
      if: matrix.os == 'ubuntu-latest'
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: 'src/client/coverage/cobertura-coverage.xml'
        badge: true
        fail_below_min: true 
        format: markdown
        output: both
      
    - name: Publish Frontend Coverage Summary
      if: matrix.os == 'ubuntu-latest'
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY