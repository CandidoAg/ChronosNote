<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Degradado moderno para el toque premium -->
    <linearGradient id="chronosGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>

  <!-- Fondo redondeado suave (estilo App Icon moderno) -->
  <rect width="512" height="512" rx="128" fill="#1e1e24" />

  <!-- Estructura del reloj de arena / Páginas de nota -->
  <g transform="translate(0, 0)">
    <!-- Triángulo Superior (Arena del tiempo / Notas entrantes) -->
    <path d="M160 160 H352 L256 256 Z" fill="url(#chronosGrad)" opacity="0.9" />
    
    <!-- Triángulo Inferior (El pozo del tiempo / Notas guardadas) -->
    <path d="M160 352 H352 L256 256 Z" fill="none" stroke="url(#chronosGrad)" stroke-width="24" stroke-linejoin="round" />
    
    <!-- Líneas horizontales simulando renglones de cuaderno dentro del tiempo -->
    <line x1="210" y1="300" x2="302" y2="300" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.8" />
    <line x1="190" y1="324" x2="322" y2="324" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.8" />

    <!-- Estructura exterior del reloj (Minimalista) -->
    <path d="M140 140 H372" stroke="#ffffff" stroke-width="28" stroke-linecap="round" />
    <path d="M140 372 H372" stroke="#ffffff" stroke-width="28" stroke-linecap="round" />
    <path d="M160 140 C160 220 220 256 256 256 C292 256 352 220 352 140" fill="none" stroke="#ffffff" stroke-width="20" opacity="0.3" />
    <path d="M160 372 C160 292 220 256 256 256 C292 256 352 292 352 372" fill="none" stroke="#ffffff" stroke-width="20" opacity="0.3" />
  </g>
</svg>
